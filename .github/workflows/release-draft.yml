name: Assemble draft release

# Deliberately manual while the repository and binaries are being validated.
# There is no tag/push trigger and the optional GitHub Release is always draft.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag/version, for example v0.1.0-alpha.1
        required: true
        type: string
      create_github_draft:
        description: Also create or update a private draft GitHub Release
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  validate:
    name: Validate release input
    runs-on: ubuntu-24.04
    steps:
      - name: Validate tag
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9A-Za-z][0-9A-Za-z._-]*$ ]]; then
            echo 'tag must look like v0.1.0 or v0.1.0-alpha.1' >&2
            exit 2
          fi

  build:
    needs: validate
    uses: ./.github/workflows/build-plugins.yml
    with:
      artifact_version: ${{ inputs.tag }}

  assemble:
    name: Assemble checksummed release candidate
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Download platform archives
        uses: actions/download-artifact@v4
        with:
          pattern: TM-Guitar-Midi-*
          path: downloaded
          merge-multiple: true

      - name: Add non-commercial research weights and checksums
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9A-Za-z][0-9A-Za-z._-]*$ ]]; then
            echo 'tag must look like v0.1.0 or v0.1.0-alpha.1' >&2
            exit 2
          fi
          mkdir -p assets weights/TM-Guitar-Midi-research-weights/models
          find downloaded -maxdepth 1 -type f -exec cp {} assets/ \;
          cp -a models/strict-cap16-v3 \
            weights/TM-Guitar-Midi-research-weights/models/
          for document in \
            LICENSE WEIGHTS_LICENSE.md CREDITS.md \
            THIRD_PARTY_NOTICES.md; do
            if [[ -f "$document" ]]; then
              cp "$document" weights/TM-Guitar-Midi-research-weights/
            fi
          done
          cmake \
            "-DTMGM_VERIFY_MODEL_ROOT=$PWD/weights/TM-Guitar-Midi-research-weights/models/strict-cap16-v3" \
            -P cmake/VerifyModelPackage.cmake
          (
            cd weights
            zip -9 -r \
              "../assets/TM-Guitar-Midi-${RELEASE_TAG}-research-weights.zip" \
              TM-Guitar-Midi-research-weights
          )
          (
            cd assets
            sha256sum * > SHA256SUMS.txt
          )

      - name: Upload complete release candidate
        uses: actions/upload-artifact@v4
        with:
          name: TM-Guitar-Midi-${{ inputs.tag }}-release-candidate
          path: assets/*
          if-no-files-found: error
          retention-days: 30

      - name: Create or update private draft release
        if: inputs.create_github_draft
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            is_draft="$(gh release view "$RELEASE_TAG" --json isDraft --jq .isDraft)"
            if [[ "$is_draft" != true ]]; then
              echo "refusing to modify published release: $RELEASE_TAG" >&2
              exit 3
            fi
            gh release upload "$RELEASE_TAG" assets/* --clobber
          else
            gh release create "$RELEASE_TAG" assets/* \
              --target "$GITHUB_SHA" \
              --title "TM Guitar MIDI $RELEASE_TAG" \
              --generate-notes \
              --draft \
              --prerelease
          fi
